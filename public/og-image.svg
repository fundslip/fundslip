        <rect x="14" y="14" width="5" height="5" rx="0.5" fill="#1d1d1f" opacity="0.08"/>
        <rect x="22" y="14" width="5" height="5" rx="0.5" fill="#1d1d1f" opacity="0.08"/>
        <rect x="14" y="22" width="5" height="5" rx="0.5" fill="#1d1d1f" opacity="0.08"/>
