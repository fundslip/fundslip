    <text x="24" y="528" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#86868b">Fundslip — fundslip.xyz</text>
    <text x="488" y="528" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#86868b">March 25, 2026</text>
