<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#ffffff"/>

  <!-- Centered logo mark -->
  <g transform="translate(130, 108)">
    <!-- Back document (depth shadow) -->
    <rect x="16" y="0" width="108" height="130" rx="16" fill="#003499" opacity="0.12"/>

    <!-- Front document -->
    <rect x="0" y="16" width="108" height="130" rx="16" fill="#003499"/>

    <!-- Content lines -->
    <rect x="20" y="40" width="64" height="5" rx="2.5" fill="#ffffff" opacity="0.8"/>
    <rect x="20" y="54" width="42" height="4" rx="2" fill="#ffffff" opacity="0.3"/>
    <rect x="20" y="66" width="52" height="4" rx="2" fill="#ffffff" opacity="0.3"/>

    <!-- Signature lines (emerald) -->
    <line x1="20" y1="88" x2="56" y2="88" stroke="#85f8c4" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="20" y1="100" x2="42" y2="100" stroke="#85f8c4" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Verified checkmark badge -->
    <circle cx="86" cy="124" r="18" fill="#85f8c4"/>
    <path d="M77,124 L83,130 L95,118" stroke="#003499" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark below -->
  <text x="200" y="300" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="600" fill="#1d1d1f" letter-spacing="-0.5">Fundslip</text>
</svg>
