<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <rect width="900" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#1d1d1f" letter-spacing="-0.3">How Fundslip Works</text>

  <!-- GENERATION SIDE -->
  <rect x="30" y="55" width="400" height="430" rx="16" fill="#f5f5f7" stroke="#e5e5ea" stroke-width="0.75"/>
  <text x="230" y="80" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#1d1d1f" letter-spacing="1">GENERATION</text>
  <text x="230" y="94" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Your browser</text>

  <!-- Step 1: Connect -->
  <rect x="60" y="115" width="340" height="44" rx="10" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="86" cy="137" r="12" fill="#003499"/>
  <text x="86" y="141" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">1</text>
  <text x="108" y="133" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Connect Wallet</text>
  <text x="108" y="147" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Fetch ETH, tokens, transactions at pinned block</text>

  <!-- Arrow -->
  <line x1="230" y1="159" x2="230" y2="175" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,173 230,179 234,173" fill="#e5e5ea"/>

  <!-- Step 2: Hash -->
  <rect x="60" y="181" width="340" height="44" rx="10" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="86" cy="203" r="12" fill="#003499"/>
  <text x="86" y="207" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">2</text>
  <text x="108" y="199" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Serialize and Hash</text>
  <text x="108" y="213" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">ABI encode all data, keccak256 into 32-byte dataHash</text>

  <!-- Arrow -->
  <line x1="230" y1="225" x2="230" y2="241" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,239 230,245 234,239" fill="#e5e5ea"/>

  <!-- Step 3: Sign -->
  <rect x="60" y="247" width="340" height="44" rx="10" fill="#ffffff" stroke="#003499" stroke-width="1"/>
  <circle cx="86" cy="269" r="12" fill="#003499"/>
  <text x="86" y="273" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">3</text>
  <text x="108" y="265" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">EIP-712 Sign</text>
  <text x="108" y="279" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Wallet signs {wallet, blockNumber, type, dataHash}</text>

  <!-- Arrow -->
  <line x1="230" y1="291" x2="230" y2="307" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,305 230,311 234,305" fill="#e5e5ea"/>

  <!-- Step 4: Pack -->
  <rect x="60" y="313" width="340" height="44" rx="10" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="86" cy="335" r="12" fill="#003499"/>
  <text x="86" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">4</text>
  <text x="108" y="331" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Build 123-byte Payload</text>
  <text x="108" y="345" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">wallet + chain + block + hash + signature, Base58</text>

  <!-- Arrow -->
  <line x1="230" y1="357" x2="230" y2="373" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,371 230,377 234,371" fill="#e5e5ea"/>

  <!-- Step 5: PDF -->
  <rect x="60" y="379" width="340" height="44" rx="10" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="86" cy="401" r="12" fill="#85f8c4"/>
  <path d="M80,401 L84,405 L92,397" stroke="#003499" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="108" y="397" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Generate Signed PDF</text>
  <text x="108" y="411" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Embed payload in metadata + QR code</text>

  <!-- Arrow from generation to verification -->
  <line x1="430" y1="401" x2="470" y2="401" stroke="#003499" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="468,397 474,401 468,405" fill="#003499"/>

  <!-- VERIFICATION SIDE -->
  <rect x="470" y="55" width="400" height="430" rx="16" fill="#f5f5f7" stroke="#e5e5ea" stroke-width="0.75"/>
  <text x="670" y="80" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#1d1d1f" letter-spacing="1">VERIFICATION</text>
  <text x="670" y="94" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Anyone's browser</text>

  <!-- V Step 1 -->
  <rect x="500" y="115" width="340" height="44" rx="10" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="526" cy="137" r="12" fill="#1d1d1f"/>
  <text x="526" y="141" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">1</text>
  <text x="548" y="133" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Upload PDF or Scan QR</text>
  <text x="548" y="147" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Extract 123-byte payload from document</text>

  <!-- Arrow -->
  <line x1="670" y1="159" x2="670" y2="175" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="666,173 670,179 674,173" fill="#e5e5ea"/>

  <!-- V Step 2 -->
  <rect x="500" y="181" width="340" height="44" rx="10" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="526" cy="203" r="12" fill="#1d1d1f"/>
  <text x="526" y="207" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">2</text>
  <text x="548" y="199" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Decode Payload</text>
  <text x="548" y="213" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Unpack wallet, block, hash, signature from 123 bytes</text>

  <!-- Arrow -->
  <line x1="670" y1="225" x2="670" y2="241" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="666,239 670,245 674,239" fill="#e5e5ea"/>

  <!-- V Step 3 -->
  <rect x="500" y="247" width="340" height="44" rx="10" fill="#ffffff" stroke="#003499" stroke-width="1"/>
  <circle cx="526" cy="269" r="12" fill="#1d1d1f"/>
  <text x="526" y="273" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">3</text>
  <text x="548" y="265" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Verify Signature</text>
  <text x="548" y="279" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Recover signer via ecrecover, match to wallet</text>

  <!-- Arrow -->
  <line x1="670" y1="291" x2="670" y2="307" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="666,305 670,311 674,305" fill="#e5e5ea"/>

  <!-- V Step 4: Branch -->
  <rect x="500" y="313" width="160" height="44" rx="10" fill="#ffffff" stroke="#85f8c4" stroke-width="1.5"/>
  <circle cx="526" cy="335" r="10" fill="#85f8c4"/>
  <path d="M521,335 L524,338 L531,331" stroke="#003499" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="544" y="332" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#059669">Authentic</text>
  <text x="544" y="345" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Signature valid</text>

  <rect x="680" y="313" width="160" height="44" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="760" y="332" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#dc2626">Failed</text>
  <text x="760" y="345" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#86868b">Tampered or forged</text>

  <!-- No server badge -->
  <rect x="540" y="395" width="260" height="36" rx="18" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <text x="670" y="417" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#86868b" letter-spacing="0.5">No server involved. Fully trustless.</text>

  <!-- Payload detail at bottom -->
  <rect x="160" y="455" width="580" height="40" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <text x="450" y="472" text-anchor="middle" font-family="monospace" font-size="8" fill="#86868b">
    [20 bytes wallet] [1 chain] [4 block] [1 type] [32 dataHash] [65 signature] = 123 bytes, Base58 encoded
  </text>
  <text x="450" y="486" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#86868b">The entire proof fits in a QR code</text>
</svg>
