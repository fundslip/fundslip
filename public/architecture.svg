<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <rect width="900" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1d1d1f" letter-spacing="-0.3">How Fundslip Works</text>

  <!-- GENERATION PANEL -->
  <rect x="28" y="50" width="404" height="420" rx="16" fill="#f5f5f7"/>
  <text x="230" y="76" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#1d1d1f" letter-spacing="1">GENERATION</text>
  <text x="230" y="90" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Your browser · Client-side only</text>

  <!-- Step 1 -->
  <rect x="56" y="108" width="348" height="46" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <rect x="72" y="119" width="24" height="24" rx="12" fill="#003499"/>
  <text x="84" y="135" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#ffffff">1</text>
  <text x="106" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Connect Wallet</text>
  <text x="106" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Fetch balances, tokens, transactions at pinned block</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="154" x2="230" y2="170" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,168 230,174 234,168" fill="#e5e5ea"/>

  <!-- Step 2 -->
  <rect x="56" y="176" width="348" height="46" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <rect x="72" y="187" width="24" height="24" rx="12" fill="#003499"/>
  <text x="84" y="203" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#ffffff">2</text>
  <text x="106" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Serialize &amp; Hash</text>
  <text x="106" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">ABI-encode all data, keccak256 into 32-byte dataHash</text>

  <!-- Arrow 2→3 -->
  <line x1="230" y1="222" x2="230" y2="238" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,236 230,242 234,236" fill="#e5e5ea"/>

  <!-- Step 3 (highlighted — the key step) -->
  <rect x="56" y="244" width="348" height="46" rx="8" fill="#ffffff" stroke="#003499" stroke-width="1"/>
  <rect x="72" y="255" width="24" height="24" rx="12" fill="#003499"/>
  <text x="84" y="271" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#ffffff">3</text>
  <text x="106" y="264" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">EIP-712 Sign</text>
  <text x="106" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Wallet signs {wallet, blockNumber, type, dataHash}</text>

  <!-- Arrow 3→4 -->
  <line x1="230" y1="290" x2="230" y2="306" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,304 230,310 234,304" fill="#e5e5ea"/>

  <!-- Step 4 -->
  <rect x="56" y="312" width="348" height="46" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <rect x="72" y="323" width="24" height="24" rx="12" fill="#003499"/>
  <text x="84" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#ffffff">4</text>
  <text x="106" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Build 123-byte Payload</text>
  <text x="106" y="346" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">wallet + chain + block + hash + signature → Base58</text>

  <!-- Arrow 4→5 -->
  <line x1="230" y1="358" x2="230" y2="374" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="226,372 230,378 234,372" fill="#e5e5ea"/>

  <!-- Step 5 (success) -->
  <rect x="56" y="380" width="348" height="46" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="84" cy="403" r="12" fill="#85f8c4"/>
  <path d="M79,403 L82,406 L89,399" stroke="#003499" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="106" y="399" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Generate Signed PDF</text>
  <text x="106" y="413" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Embed payload in metadata + QR code</text>

  <!-- Dashed arrow connecting generation → verification -->
  <line x1="432" y1="403" x2="468" y2="403" stroke="#003499" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="466,399 472,403 466,407" fill="#003499"/>

  <!-- VERIFICATION PANEL -->
  <rect x="468" y="50" width="404" height="420" rx="16" fill="#f5f5f7"/>
  <text x="670" y="76" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#1d1d1f" letter-spacing="1">VERIFICATION</text>
  <text x="670" y="90" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Anyone's browser · No account needed</text>

  <!-- V Step 1 -->
  <rect x="496" y="108" width="348" height="46" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <rect x="512" y="119" width="24" height="24" rx="12" fill="#1d1d1f"/>
  <text x="524" y="135" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#ffffff">1</text>
  <text x="546" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Upload PDF or Scan QR</text>
  <text x="546" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Extract 123-byte payload from document</text>

  <!-- Arrow -->
  <line x1="670" y1="154" x2="670" y2="170" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="666,168 670,174 674,168" fill="#e5e5ea"/>

  <!-- V Step 2 -->
  <rect x="496" y="176" width="348" height="46" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <rect x="512" y="187" width="24" height="24" rx="12" fill="#1d1d1f"/>
  <text x="524" y="203" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#ffffff">2</text>
  <text x="546" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Decode Payload</text>
  <text x="546" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Unpack wallet, block, hash, signature from Base58</text>

  <!-- Arrow -->
  <line x1="670" y1="222" x2="670" y2="238" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="666,236 670,242 674,236" fill="#e5e5ea"/>

  <!-- V Step 3 (highlighted) -->
  <rect x="496" y="244" width="348" height="46" rx="8" fill="#ffffff" stroke="#003499" stroke-width="1"/>
  <rect x="512" y="255" width="24" height="24" rx="12" fill="#1d1d1f"/>
  <text x="524" y="271" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#ffffff">3</text>
  <text x="546" y="264" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#1d1d1f">Verify Signature</text>
  <text x="546" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Recover signer via ecrecover, match to wallet address</text>

  <!-- Arrow -->
  <line x1="670" y1="290" x2="670" y2="306" stroke="#e5e5ea" stroke-width="1"/>
  <polygon points="666,304 670,310 674,304" fill="#e5e5ea"/>

  <!-- V Step 4: Result — two outcomes side by side -->
  <rect x="496" y="312" width="164" height="46" rx="8" fill="#ffffff" stroke="#85f8c4" stroke-width="1.5"/>
  <circle cx="520" cy="335" r="10" fill="#85f8c4"/>
  <path d="M515.5,335 L518,337.5 L524.5,331" stroke="#003499" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="538" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#1d1d1f">Authentic</text>
  <text x="538" y="345" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Signature valid</text>

  <rect x="680" y="312" width="164" height="46" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
  <circle cx="704" cy="335" r="10" fill="#e5e5ea"/>
  <line x1="699" y1="330" x2="709" y2="340" stroke="#86868b" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="709" y1="330" x2="699" y2="340" stroke="#86868b" stroke-width="1.8" stroke-linecap="round"/>
  <text x="722" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#86868b">Failed</text>
  <text x="722" y="345" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">Tampered or forged</text>

  <!-- Trustless badge -->
  <rect x="540" y="388" width="260" height="36" rx="18" fill="#ffffff" stroke="#e5e5ea" stroke-width="0.75"/>
  <circle cx="564" cy="406" r="3" fill="#85f8c4"/>
  <text x="670" y="410" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#86868b" letter-spacing="0.3">No server involved. Fully trustless.</text>

  <!-- Payload breakdown at bottom -->
  <rect x="120" y="484" width="660" height="24" rx="4" fill="#f5f5f7"/>
  <text x="450" y="500" text-anchor="middle" font-family="monospace" font-size="8" fill="#86868b">[20 wallet] [1 chain] [4 block] [1 type] [32 dataHash] [65 signature] = 123 bytes → Base58 → QR code</text>
</svg>
