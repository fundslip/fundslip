<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <rect width="1200" height="300" fill="#ffffff"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.6" fill="#e5e5ea"/>
  </pattern>
  <rect width="1200" height="300" fill="url(#dots)"/>

  <!-- Logo icon -->
  <g transform="translate(480, 80)">
    <rect x="5" y="0" width="38" height="46" rx="4" fill="#0048cc" opacity="0.3"/>
    <rect x="0" y="5" width="38" height="46" rx="4" fill="#003499"/>
    <rect x="8" y="13" width="22" height="1.8" rx="0.9" fill="#ffffff" opacity="0.85"/>
    <rect x="8" y="18.5" width="15" height="1.8" rx="0.9" fill="#ffffff" opacity="0.4"/>
    <rect x="8" y="24" width="18" height="1.8" rx="0.9" fill="#ffffff" opacity="0.4"/>
    <line x1="8" y1="33" x2="22" y2="33" stroke="#85f8c4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="37" x2="16" y2="37" stroke="#85f8c4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <circle cx="30" cy="40" r="5.5" fill="#85f8c4"/>
    <path d="M27.2,40 L29,41.8 L32.8,37.8" stroke="#003499" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- "Fundslip" text -->
  <text x="536" y="108" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="600" fill="#1d1d1f" letter-spacing="-0.5">Fundslip</text>

  <!-- Tagline -->
  <text x="600" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#86868b" letter-spacing="-0.2">Verifiable financial statements from Ethereum wallets</text>

  <!-- Three pills -->
  <g transform="translate(370, 200)">
    <rect x="0" y="0" width="120" height="26" rx="13" fill="none" stroke="#e5e5ea" stroke-width="1"/>
    <circle cx="16" cy="13" r="2.5" fill="#85f8c4"/>
    <text x="26" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#86868b">Open Source</text>

    <rect x="135" y="0" width="110" height="26" rx="13" fill="none" stroke="#e5e5ea" stroke-width="1"/>
    <circle cx="151" cy="13" r="2.5" fill="#85f8c4"/>
    <text x="161" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#86868b">No Backend</text>

    <rect x="260" y="0" width="130" height="26" rx="13" fill="none" stroke="#e5e5ea" stroke-width="1"/>
    <circle cx="276" cy="13" r="2.5" fill="#85f8c4"/>
    <text x="286" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#86868b">Client-Side Only</text>
  </g>

  <!-- Bottom line -->
  <line x1="100" y1="270" x2="1100" y2="270" stroke="#e5e5ea" stroke-width="0.5"/>
  <text x="600" y="288" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#86868b" letter-spacing="2">EIP-712 SIGNED  ·  TRUSTLESS  ·  MIT LICENSE</text>
</svg>
