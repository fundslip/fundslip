      <text x="44" y="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="500" fill="#1d1d1f">Verify this statement</text>
      <text x="44" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#003499">fundslip.xyz/verify</text>
