      <g transform="translate(4, 4)">
        <rect x="0" y="0" width="10" height="10" rx="1.5" fill="#1d1d1f" opacity="0.12"/>
        <rect x="18" y="0" width="10" height="10" rx="1.5" fill="#1d1d1f" opacity="0.12"/>
        <rect x="0" y="18" width="10" height="10" rx="1.5" fill="#1d1d1f" opacity="0.12"/>
        <rect x="2.5" y="2.5" width="5" height="5" rx="0.75" fill="#1d1d1f" opacity="0.25"/>
        <rect x="20.5" y="2.5" width="5" height="5" rx="0.75" fill="#1d1d1f" opacity="0.25"/>
        <rect x="2.5" y="20.5" width="5" height="5" rx="0.75" fill="#1d1d1f" opacity="0.25"/>
        <rect x="12" y="12" width="5" height="5" rx="0.5" fill="#1d1d1f" opacity="0.08"/>
        <rect x="19" y="12" width="5" height="5" rx="0.5" fill="#1d1d1f" opacity="0.08"/>
        <rect x="12" y="19" width="5" height="5" rx="0.5" fill="#1d1d1f" opacity="0.08"/>
        <rect x="19" y="19" width="9" height="9" rx="0.5" fill="#1d1d1f" opacity="0.08"/>
