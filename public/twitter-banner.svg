      <text x="170" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#86868b" letter-spacing="0.6">NETWORK</text>
      <text x="170" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#1d1d1f">Ethereum</text>
      <text x="310" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#86868b" letter-spacing="0.6">BLOCK</text>
      <text x="310" y="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#1d1d1f">#21,842,306</text>
