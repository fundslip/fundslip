<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <rect width="1500" height="500" fill="#ffffff"/>

  <!-- Left side: brand + headline (positioned to avoid profile photo overlap in bottom-left) -->
  <g transform="translate(100, 80)">
    <!-- Logo mark -->
    <rect x="5" y="0" width="40" height="48" rx="6" fill="#003499" opacity="0.15"/>
    <rect x="0" y="5" width="40" height="48" rx="6" fill="#003499"/>
    <rect x="8" y="16" width="22" height="2.5" rx="1.25" fill="#ffffff" opacity="0.8"/>
    <rect x="8" y="22" width="14" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
    <rect x="8" y="27" width="18" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
    <line x1="8" y1="35" x2="20" y2="35" stroke="#85f8c4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="8" y1="40" x2="15" y2="40" stroke="#85f8c4" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <circle cx="32" cy="44" r="6.5" fill="#85f8c4"/>
    <path d="M28.5,44 L30.5,46 L35.5,41" stroke="#003499" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

