    <text x="24" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#86868b">Fundslip — fundslip.xyz</text>
    <text x="456" y="400" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" fill="#86868b">March 25, 2026</text>
  </g>

  <!-- Bottom bar -->
