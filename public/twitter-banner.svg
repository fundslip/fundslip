    <text x="0" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#86868b" letter-spacing="-0.3">Verifiable by anyone.</text>

    <!-- Trust pills -->
    <g transform="translate(0, 170)">
      <rect x="0" y="0" width="120" height="28" rx="14" fill="none" stroke="#e5e5ea" stroke-width="0.75"/>
      <circle cx="15" cy="14" r="2.5" fill="#85f8c4"/>
      <text x="24" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#86868b">Open Source</text>

      <rect x="132" y="0" width="112" height="28" rx="14" fill="none" stroke="#e5e5ea" stroke-width="0.75"/>
      <circle cx="147" cy="14" r="2.5" fill="#85f8c4"/>
      <text x="156" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#86868b">No Backend</text>

      <rect x="256" y="0" width="120" height="28" rx="14" fill="none" stroke="#e5e5ea" stroke-width="0.75"/>
      <circle cx="271" cy="14" r="2.5" fill="#85f8c4"/>
      <text x="280" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#86868b">Free Forever</text>
