      <rect x="3" y="4" width="7" height="1.4" rx="0.7" fill="#ffffff" opacity="0.7"/>
      <rect x="3" y="7.5" width="4.5" height="1.2" rx="0.6" fill="#ffffff" opacity="0.3"/>
      <text x="18" y="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1d1d1f">Fundslip</text>

      <rect x="360" y="0" width="62" height="18" rx="9" fill="#85f8c4" opacity="0.15"/>
      <circle cx="372" cy="9" r="3" fill="#85f8c4"/>
