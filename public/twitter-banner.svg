      <text x="28" y="89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" fill="#86868b">58,382.88 USDC</text>
      <text x="408" y="82" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#1d1d1f">$58,382.88</text>

