<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <rect width="1500" height="500" fill="#ffffff"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
    <circle cx="25" cy="25" r="0.6" fill="#e5e5ea"/>
  </pattern>
  <rect width="1500" height="500" fill="url(#dots)"/>

  <!-- LEFT SIDE: icon + text + pills -->
  <!-- Left margin: 100. Left content runs ~100 to ~800. -->
  <!-- RIGHT SIDE: card 440px wide. Card runs 860 to 1300. Right margin: 200. -->
  <!-- Visually balanced: ~100 left, ~200 right (card is heavier so needs more air) -->

  <!-- Document icon -->
  <g transform="translate(140, 115)">
    <rect x="10" y="0" width="72" height="86" rx="9" fill="#003499" opacity="0.12"/>
    <rect x="0" y="10" width="72" height="86" rx="9" fill="#003499"/>
    <rect x="12" y="26" width="46" height="3" rx="1.5" fill="#ffffff" opacity="0.8"/>
    <rect x="12" y="34" width="28" height="2.5" rx="1.25" fill="#ffffff" opacity="0.3"/>
    <rect x="12" y="41" width="36" height="2.5" rx="1.25" fill="#ffffff" opacity="0.3"/>
    <line x1="12" y1="56" x2="36" y2="56" stroke="#85f8c4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="64" x2="26" y2="64" stroke="#85f8c4" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="58" cy="78" r="12" fill="#85f8c4"/>
    <path d="M51,78 L55,82 L65,72" stroke="#003499" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Fundslip -->
  <text x="240" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="600" fill="#1d1d1f" letter-spacing="-1.5">Fundslip</text>

  <!-- Tagline -->
  <text x="240" y="224" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#86868b" letter-spacing="-0.3">Verifiable financial statements from Ethereum wallets</text>

  <!-- Three pills -->
  <g transform="translate(240, 260)">
    <rect x="0" y="0" width="134" height="30" rx="15" fill="none" stroke="#e5e5ea" stroke-width="0.75"/>
    <circle cx="18" cy="15" r="2.5" fill="#85f8c4"/>
    <text x="28" y="19.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#86868b">Open Source</text>

    <rect x="148" y="0" width="122" height="30" rx="15" fill="none" stroke="#e5e5ea" stroke-width="0.75"/>
    <circle cx="166" cy="15" r="2.5" fill="#85f8c4"/>
    <text x="176" y="19.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#86868b">No Backend</text>

    <rect x="284" y="0" width="112" height="30" rx="15" fill="none" stroke="#e5e5ea" stroke-width="0.75"/>
    <circle cx="302" cy="15" r="2.5" fill="#85f8c4"/>
    <text x="312" y="19.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#86868b">EIP-712</text>
  </g>

  <!-- RIGHT SIDE: statement preview card -->
  <g transform="translate(860, 50)">
    <rect x="0" y="0" width="460" height="400" rx="16" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>

    <!-- Header -->
    <g transform="translate(28, 26)">
      <rect x="0" y="0" width="16" height="20" rx="3.5" fill="#003499"/>
      <rect x="3.5" y="5" width="8" height="1.8" rx="0.9" fill="#ffffff" opacity="0.7"/>
      <rect x="3.5" y="9.5" width="5" height="1.8" rx="0.9" fill="#ffffff" opacity="0.3"/>
      <text x="22" y="15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1d1d1f">Fundslip</text>
      <text x="364" y="15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#059669" letter-spacing="0.8">VERIFIED</text>
    </g>
    <line x1="28" y1="58" x2="432" y2="58" stroke="#e5e5ea" stroke-width="0.75"/>

    <!-- Net worth -->
    <text x="28" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#86868b" letter-spacing="0.8">TOTAL NET WORTH</text>
    <text x="28" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="600" fill="#1d1d1f" letter-spacing="-0.5">$142,502<tspan fill="#86868b" opacity="0.3">.88</tspan></text>
    <text x="28" y="140" font-family="monospace" font-size="11" fill="#86868b">Block #19,452,102 · Ethereum</text>

    <!-- Holdings -->
    <text x="28" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#86868b" letter-spacing="0.8">HOLDINGS</text>
    <line x1="28" y1="184" x2="432" y2="184" stroke="#e5e5ea" stroke-width="0.5"/>

    <g transform="translate(33, 199) scale(0.6875)">
      <g fill="#000000" fill-rule="evenodd">
        <path d="M16 32C7.163 32 0 24.837 0 16S7.163 0 16 0s16 7.163 16 16-7.163 16-16 16zm7.994-15.781L16.498 4 9 16.22l7.498 4.353 7.496-4.354zM24 17.616l-7.502 4.351L9 17.617l7.498 10.378L24 17.616z"/>
        <g fill-rule="nonzero">
          <path fill-opacity=".298" d="M16.498 4v8.87l7.497 3.35zm0 17.968v6.027L24 17.616z"/>
          <path fill-opacity=".801" d="M16.498 20.573l7.497-4.353-7.497-3.348z"/>
          <path fill-opacity=".298" d="M9 16.22l7.498 4.353v-7.701z"/>
        </g>
      </g>
    </g>
    <text x="64" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#1d1d1f">Ethereum</text>
    <text x="408" y="215" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#1d1d1f">$84,120.00</text>

    <line x1="28" y1="234" x2="432" y2="234" stroke="#e5e5ea" stroke-width="0.4"/>

    <g transform="translate(33, 247) scale(0.6875)">
      <g fill="none">
        <circle fill="#3E73C4" cx="16" cy="16" r="16"/>
        <g fill="#FFF">
          <path d="M20.022 18.124c0-2.124-1.28-2.852-3.84-3.156-1.828-.243-2.193-.728-2.193-1.578 0-.85.61-1.396 1.828-1.396 1.097 0 1.707.364 2.011 1.275a.458.458 0 00.427.303h.975a.416.416 0 00.427-.425v-.06a3.04 3.04 0 00-2.743-2.489V9.142c0-.243-.183-.425-.487-.486h-.915c-.243 0-.426.182-.487.486v1.396c-1.829.242-2.986 1.456-2.986 2.974 0 2.002 1.218 2.791 3.778 3.095 1.707.303 2.255.668 2.255 1.639 0 .97-.853 1.638-2.011 1.638-1.585 0-2.133-.667-2.316-1.578-.06-.242-.244-.364-.427-.364h-1.036a.416.416 0 00-.426.425v.06c.243 1.518 1.219 2.61 3.23 2.914v1.457c0 .242.183.425.487.485h.915c.243 0 .426-.182.487-.485V21.34c1.829-.303 3.047-1.578 3.047-3.217z"/>
          <path d="M12.892 24.497c-4.754-1.7-7.192-6.98-5.424-11.653.914-2.55 2.925-4.491 5.424-5.402.244-.121.365-.303.365-.607v-.85c0-.242-.121-.424-.365-.485-.061 0-.183 0-.244.06a10.895 10.895 0 00-7.13 13.717c1.096 3.4 3.717 6.01 7.13 7.102.244.121.488 0 .548-.243.061-.06.061-.122.061-.243v-.85c0-.182-.182-.424-.365-.546zm6.46-18.936c-.244-.122-.488 0-.548.242-.061.061-.061.122-.061.243v.85c0 .243.182.485.365.607 4.754 1.7 7.192 6.98 5.424 11.653-.914 2.55-2.925 4.491-5.424 5.402-.244.121-.365.303-.365.607v.85c0 .242.121.424.365.485.061 0 .183 0 .244-.06a10.895 10.895 0 007.13-13.717c-1.096-3.46-3.778-6.07-7.13-7.162z"/>
        </g>
      </g>
    </g>
    <text x="64" y="263" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#1d1d1f">USD Coin</text>
    <text x="408" y="263" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#1d1d1f">$58,382.88</text>

    <!-- Footer -->
    <line x1="28" y1="310" x2="432" y2="310" stroke="#e5e5ea" stroke-width="0.5"/>
    <text x="28" y="336" font-family="monospace" font-size="11" fill="#86868b">sshdopey.eth · EIP-712 Signed</text>
    <text x="408" y="336" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#003499">fundslip.xyz/verify</text>
  </g>

  <!-- Bottom -->
  <line x1="100" y1="450" x2="1400" y2="450" stroke="#e5e5ea" stroke-width="0.5"/>
  <text x="750" y="476" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#86868b">fundslip.xyz</text>
</svg>
